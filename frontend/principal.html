<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Principal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .product-card { transition: transform 0.2s; border: none; }
        .product-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important; }
        .product-img { height: 160px; object-fit: cover; }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark shadow-sm">
        <div class="container">
            <span class="navbar-brand mb-0 h1 fw-bold text-info">⚙️ Sistema INVEN-SYS</span>
            <div class="d-flex align-items-center gap-3">
                <span class="text-light">Usuario: <strong id="user-display" class="text-warning"></strong></span>
                <button id="btn-logout" class="btn btn-outline-danger btn-sm fw-bold">Salir</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="p-4 mb-4 bg-white rounded-3 shadow-sm border d-flex justify-content-between align-items-center flex-wrap gap-3">
            <div>
                <h2 class="fw-bold text-secondary mb-1">Panel de Control de Inventario</h2>
                <p class="text-muted mb-0">Gestión de stock en tiempo real y consultas de catálogo.</p>
            </div>
            <div>
                <a href="./buscador.html" class="btn btn-primary btn-lg fw-bold px-4 shadow-sm">🔍 Ir al Buscador Avanzado</a>
            </div>
        </div>

        <h4 class="fw-bold text-dark mb-3">📦 Productos en Almacén</h4>
        <div class="row row-cols-1 row-cols-md-3 g-4" id="catalogo-grid">
            </div>
    </div>

    <script>
        if (!localStorage.getItem('session_user')) {
            window.location.href = "./index.html";
        } else {
            document.getElementById('user-display').textContent = localStorage.getItem('session_user');
        }

        document.getElementById('btn-logout').addEventListener('click', () => {
            localStorage.removeItem('session_user');
            window.location.href = "./index.html";
        });

        // Carga dinámica de productos desde la API de Flask
        const BACKEND_URL = "http://127.0.0.1:5000";

        async function cargarCatalogo() {
            const grid = document.getElementById('catalogo-grid');
            try {
                const response = await fetch(`${BACKEND_URL}/api/productos`);
                const data = await response.json();
                
                if (data.success) {
                    let htmlContent = '';
                    for (const [id, prod] of Object.entries(data.productos)) {
                        // Lógica de colores para el Badge de Stock
                        let stockBadge = `<span class="badge bg-success">${prod.stock} Unid.</span>`;
                        if (prod.stock === 0) {
                            stockBadge = `<span class="badge bg-danger">Agotado</span>`;
                        } else if (prod.stock <= 5) {
                            stockBadge = `<span class="badge bg-warning text-dark">Stock Bajo (${prod.stock})</span>`;
                        }

                        htmlContent += `
                            <div class="col">
                                <div class="card h-100 shadow-sm product-card">
                                    <img src="${prod.imagen}" class="card-img-top product-img" alt="${prod.nombre}">
                                    <div class="card-body d-flex flex-column">
                                        <span class="text-uppercase text-muted small fw-bold">${prod.categoria}</span>
                                        <h5 class="card-title fw-bold text-dark mt-1">${prod.nombre}</h5>
                                        <div class="mt-auto">
                                            <div class="d-flex justify-content-between align-items-center mt-3">
                                                <span class="fs-5 fw-bold text-primary">${prod.precio}</span>
                                                ${stockBadge}
                                            </div>
                                            <small class="text-secondary d-block mt-2">SKU: <strong>${id}</strong></small>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `;
                    }
                    grid.innerHTML = htmlContent;
                }
            } catch (err) {
                grid.innerHTML = `<div class="col-12 text-center text-danger fw-bold">Error al conectar con la API de inventario.</div>`;
            }
        }

        cargarCatalogo();
    </script>
</body>
</html>
