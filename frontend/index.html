<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso al Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">
    <div class="card shadow-lg" style="width: 400px;">
        <div class="card-body p-4">
            <h3 class="card-title text-center mb-4 fw-bold">Inicio de Sesión</h3>
            <div id="error-alert" class="alert alert-danger d-none text-center py-2" role="alert"></div>
            <form id="login-form">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Usuario:</label>
                    <input type="text" class="form-control" id="username" required autocomplete="off">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Contraseña:</label>
                    <input type="password" class="form-control" id="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 fw-bold mt-2">Ingresar al Sistema</button>
            </form>
        </div>
    </div>
    <script>
        const BACKEND_URL = "https://sistema-backend-unfv.onrender.com";
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const alertBox = document.getElementById('error-alert');
            alertBox.classList.add('d-none');
            try {
                const response = await fetch(`${BACKEND_URL}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const result = await response.json();
                if (result.success) {
                    localStorage.setItem('session_user', result.user);
                    // Uso de ruta relativa explícita para evitar el Not Found local
                    window.location.href = "./principal.html";
                } else {
                    alertBox.textContent = result.message;
                    alertBox.classList.remove('d-none');
                }
            } catch (err) {
                alertBox.textContent = "Error de conexión con el Backend.";
                alertBox.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
